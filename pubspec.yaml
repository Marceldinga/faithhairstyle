name: faithhairstyle
description: AI-powered hairstyle booking app built with Flutter and Supabase
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.16.0
  http: ^1.2.0
  intl: ^0.20.3
  url_launcher: ^6.3.2
  webview_flutter: ^4.14.1
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.1.2
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  image_picker: ^1.2.3
  file_picker: ^11.0.2
  permission_handler: ^12.0.3
  flutter_svg: ^2.3.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/